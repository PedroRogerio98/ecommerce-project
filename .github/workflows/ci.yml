name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [feature/*]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ecommerce_user
          POSTGRES_PASSWORD: 123456
          POSTGRES_DB: ecommerce_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Setup Database Table
        env:
          PGPASSWORD: 123456
        run: |
          sudo apt-get install -y postgresql-client
          psql -h localhost -U ecommerce_user -d ecommerce_db -c "CREATE TABLE products (id SERIAL PRIMARY KEY, nome VARCHAR(255), descricao TEXT, preco NUMERIC);"

      - name: Run tests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: ecommerce_user
          DB_PASSWORD: 123456
          DB_NAME: ecommerce_db
        run: npm test

      - name: Build project
        run: npm run build